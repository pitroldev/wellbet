packages:
  - apps/*
  - packages/*

# node-linker: Expo/React Native exigem layout HASTEADO (binários nativos + C++
# em node_modules raso). pnpm 11 lê isto AQUI (no .npmrc a chave é ignorada,
# igual `overrides` no package.json). Isolado (.pnpm) gera caminhos de ~190 chars
# que estouram o limite de 250 do CMake no build Android em Windows (worklets/nitro).
nodeLinker: hoisted

# Build scripts aprovados (pnpm 11 bloqueia postinstall por padrão — segurança).
# true = roda o build do pacote; false = bloqueia (telemetria etc.).
allowBuilds:
  "@scarf/scarf": false # telemetria de analytics — não precisa rodar nada
  "@swc/core": true # compilador SWC (dev rápido: nest start -b swc)
  cpu-features: false # otimização opcional do ssh2; desnecessária p/ docker local
  esbuild: true # binário de bundling (Vitest/tsx)
  protobufjs: true # usado pelo exporter OTLP
  sharp: true # otimização de imagem do next/image (admin)
  ssh2: false # dep do testcontainers; build nativo só p/ docker REMOTO (SSH) — local usa npipe
  unrs-resolver: true # resolver nativo do oxlint/eslint

# Override de resolução: força UM único React/React-DOM em todo o monorepo.
# Next 16 + framer-motion/lucide resolviam um react@19.2.4 paralelo ao react@19.2.0
# do catálogo (peer-deps), criando DOIS Reacts → "Cannot read properties of null
# (reading 'useContext')" no prerender do /_global-error. 19.2.0 casa com o
# React Native 0.86 (mobile). (Override fica AQUI; pnpm 11 ignora pnpm.overrides
# no package.json.)
overrides:
  react: 19.2.0
  react-dom: 19.2.0

# Catálogo central de versões compartilhadas (pnpm catalogs).
# Apps/pacotes referenciam com "catalog:" para manter uma versão única.
# Versões alinhadas ao baseline jun/2026 do doc de Arquitetura Técnica.
catalog:
  # Linguagem / core
  typescript: ^5.9.3
  zod: ^4.4.3
  # React (precisa casar com o React do React Native 0.85 → 19.2)
  react: 19.2.0
  react-dom: 19.2.0
  # Estado de servidor (compartilhado admin + mobile)
  "@tanstack/react-query": ^5.101.0
  # Tooling
  turbo: ^2.9.0
  vitest: ^4.1.0
  prettier: ^3.8.0
  eslint: ^9.34.0
  typescript-eslint: ^8.61.0
  oxlint: ^1.0.0
  knip: ^6.0.0
  syncpack: ^15.0.0
  "@changesets/cli": ^2.31.0
  "@t3-oss/env-core": ^0.13.0

minimumReleaseAgeExclude:
  - react-hook-form@7.80.0

# Supply-chain (pnpm 11): atraso mínimo para aceitar versões recém-publicadas.
# Desativado no bootstrap porque fixamos versões de ponta (várias publicadas
# nas últimas 24h), o que o gate rejeitaria. A proteção real do dia a dia é o
# pnpm-lock.yaml commitado (instala versões exatas) + revisão de updates via
# Renovate. Reative (ex.: 1440 = 1 dia) quando o conjunto de deps estabilizar.
# minimumReleaseAge: 1440
