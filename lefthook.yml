# Lefthook — git hooks paralelos e monorepo-aware (substitui Husky + lint-staged).
# §7/§8: oxlint como pré-passo rápido, depois Prettier check nos arquivos staged,
# e (opcional) typecheck do afetado. commit-msg roda commitlint.
# Instalar os hooks: `pnpm lefthook install` (rodado pelo script `prepare`).

pre-commit:
  parallel: true
  commands:
    # 1) oxlint na ÁRVORE (respeita .gitignore; --quiet = só erros). Rodar na
    #    árvore toda — e não por {staged_files} — evita o limite de tamanho de
    #    linha de comando do Windows quando há muitos arquivos no commit.
    oxlint:
      run: pnpm exec oxlint --quiet
    # 2) Prettier na ÁRVORE (usa .prettierignore + --ignore-unknown). Mesmo
    #    motivo: comando de tamanho fixo, robusto no Windows.
    prettier:
      run: pnpm exec prettier --check . --ignore-unknown
    # 3) ESLint type-aware — fonte da verdade do lint (§7). Roda via Turborepo
    #    (`turbo run lint`), que invoca o `lint` de cada pacote/app com seu
    #    próprio eslint.config.mjs (apps + packages, todos cabeados ao preset
    #    @charya/config). Comando de TAMANHO FIXO — NÃO passa {staged_files},
    #    evitando o limite de tamanho de linha de comando do Windows; o Turbo
    #    cacheia, então re-rodar sem mudanças é barato. O playground é
    #    experimental e não tem script `lint`, então fica fora do gate.
    eslint:
      run: pnpm exec turbo run lint

# Typecheck do afetado fica como hook pre-push (mais pesado que pre-commit).
# Roda só os pacotes afetados pelo diff contra a main via Turborepo.
pre-push:
  commands:
    typecheck-affected:
      run: pnpm exec turbo run typecheck --affected
      # TODO: ajustar a base do affected (`--affected` compara contra main por
      # padrão; em fork/branch longa pode precisar de TURBO_SCM_BASE).

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
