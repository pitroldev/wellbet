name: CD — Infra (OpenTofu)

# §8.4:
#   PR em infra/  → tofu plan comentado no PR (não aplica).
#   merge na main → tofu apply em STAGING (auto) → tofu apply em PROD (manual).
on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/cd-infra.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/cd-infra.yml"
  workflow_dispatch:

concurrency:
  group: cd-infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC p/ o provider de nuvem.
  pull-requests: write # comentar o plan no PR.

env:
  TOFU_VERSION: "1.10.0"
  WORKDIR: infra/terraform

jobs:
  # No PR: fmt + validate + plan, com o diff comentado no PR (não aplica nada).
  plan:
    name: tofu plan (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      - name: tofu fmt -check
        working-directory: ${{ env.WORKDIR }}
        run: tofu fmt -check -recursive
      - name: tofu init
        working-directory: ${{ env.WORKDIR }}/envs/staging
        run: tofu init -input=false
      - name: tofu validate
        working-directory: ${{ env.WORKDIR }}/envs/staging
        run: tofu validate
      - name: tofu plan (staging)
        working-directory: ${{ env.WORKDIR }}/envs/staging
        run: tofu plan -input=false -no-color -out=tfplan | tee plan.txt
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const plan = fs.readFileSync('${{ env.WORKDIR }}/envs/staging/plan.txt', 'utf8');
            const body = ['### tofu plan (staging)', '```', plan.slice(0, 60000), '```'].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # Na main: apply em staging automático.
  apply-staging:
    name: tofu apply (staging)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      - name: tofu init
        working-directory: ${{ env.WORKDIR }}/envs/staging
        run: tofu init -input=false
      - name: tofu apply (staging)
        working-directory: ${{ env.WORKDIR }}/envs/staging
        run: tofu apply -input=false -auto-approve

  # Na main: apply em prod com aprovação manual (Environment production).
  apply-prod:
    name: tofu apply (prod — aprovação manual)
    if: github.event_name == 'push'
    needs: apply-staging
    runs-on: ubuntu-latest
    environment: production # reviewers do Environment = gate manual.
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
      - name: tofu init
        working-directory: ${{ env.WORKDIR }}/envs/prod
        run: tofu init -input=false
      - name: tofu apply (prod)
        working-directory: ${{ env.WORKDIR }}/envs/prod
        run: tofu apply -input=false -auto-approve
