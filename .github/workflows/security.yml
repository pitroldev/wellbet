name: Security

# Scanning de segurança contínuo. Reúne três varreduras independentes que rodam
# tanto no PR (barrar cedo) quanto no push da main (cobrir o que entra na base):
#   1) gitleaks   — secret scanning (credenciais vazadas no histórico/diff).
#   2) pnpm audit — vulnerabilidades em dependências (falha em high/critical).
#   3) trivy fs   — varredura do filesystem do repo (deps + IaC + misconfig).
# CodeQL (SAST) vive em codeql.yml por exigir um setup próprio (init/analyze).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancela runs antigos do mesmo PR; na main cada push tem seu próprio run.
  group: security-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # 1) SECRET SCANNING — gitleaks varre diff (PR) e histórico (push). fetch-depth: 0
  #    é obrigatório: sem o histórico completo o gitleaks não consegue auditar os
  #    commits anteriores, só o estado atual.
  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE só é exigido em repositório de organização.
          # Em repo pessoal/público pode ser omitido sem quebrar o job.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # 2) DEPENDENCY VULN SCAN — pnpm audit. Node 24 + pnpm 11.7.0 vêm do mise
  #    (mesmo padrão do ci.yml/cd-*.yml: jdx/mise-action lê o mise.toml). O
  #    --audit-level=high faz o comando retornar exit code != 0 (logo, falha o
  #    job) quando houver vuln HIGH ou CRITICAL — moderate/low não quebram.
  #    --prod ignora devDependencies (não vão para o runtime/imagem), reduzindo
  #    falso-positivo de ferramentas de build.
  audit:
    name: pnpm audit (deps · high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
        with:
          install: true
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (falha em high/critical)
        run: pnpm audit --audit-level=high --prod

  # 3) IMAGE/FS SCAN — Trivy no filesystem do repo: pega vulns de dependências,
  #    segredos e misconfig de IaC sem precisar buildar imagem. severity
  #    HIGH,CRITICAL + exit-code 1 = o achado quebra o build. ignore-unfixed
  #    evita ruído de CVE sem patch disponível.
  trivy-fs:
    name: trivy fs (repo · HIGH,CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # TODO(trivy image): atrelar ao build da imagem Docker da api/admin.
      # Quando o cd-backend/cd-admin publicar a imagem imutável (taggeada por
      # SHA), rodar `trivy image` na MESMA tag antes de promover staging→prod:
      #
      #   - uses: aquasecurity/trivy-action@0.28.0
      #     with:
      #       scan-type: image
      #       image-ref: ${{ needs.build.outputs.image }}
      #       severity: HIGH,CRITICAL
      #       ignore-unfixed: true
      #       exit-code: "1"
      #
      # Depende de: apps/api/Dockerfile e apps/admin/Dockerfile (hoje TODO nos
      # cd-*.yml) + output `image` do job build.

  # Gate único de segurança — facilita exigir um só check na branch protection.
  security-ok:
    name: Security ok
    runs-on: ubuntu-latest
    needs: [gitleaks, audit, trivy-fs]
    if: always()
    steps:
      - name: Verifica resultados
        run: |
          if [ "${{ needs.gitleaks.result }}" != "success" ] \
            || [ "${{ needs.audit.result }}" != "success" ] \
            || [ "${{ needs.trivy-fs.result }}" != "success" ]; then
            echo "Security falhou"; exit 1
          fi
          echo "Security ok"
